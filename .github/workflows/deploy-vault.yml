name: Deploy Vault

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: cd web && npm ci

      - name: Build Vault app
        run: cd web && npm run build:vault

      - name: Checkout vault repo
        uses: actions/checkout@v4
        with:
          repository: aruncse-dev/vault
          token: ${{ secrets.VAULT_DEPLOY_TOKEN }}
          path: vault-repo

      - name: Copy build to vault repo
        run: |
          rm -rf vault-repo/*
          cp -r web/dist/* vault-repo/

      - name: Commit and push to vault repo
        working-directory: vault-repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Deploy: Build ${{ github.sha }}" || echo "No changes to commit"
          git push
